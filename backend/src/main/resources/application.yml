spring:
  application:
    name: todo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tododb}
    username: ${DB_USERNAME:todo}
    password: ${DB_PASSWORD:todo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    annotations:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${OBSERVABILITY_ENVIRONMENT:local}
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.springframework: INFO
  structured:
    format:
      console: logstash

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS1mb3ItdG9kby1hcHAtaW4tZGV2}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,https://*.app.github.dev,https://*.githubpreview.dev}

observability:
  environment: ${OBSERVABILITY_ENVIRONMENT:local}
  loki:
    url: ""
    username: ""
    password: ""
