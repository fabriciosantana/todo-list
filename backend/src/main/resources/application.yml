spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tododb}
    username: ${DB_USERNAME:todo}
    password: ${DB_PASSWORD:todo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS1mb3ItdG9kby1hcHAtaW4tZGV2}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,https://*.app.github.dev,https://*.githubpreview.dev}
